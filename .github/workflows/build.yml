name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (self-contained win-x64)
        run: dotnet publish DynamicIsland.csproj -f net9.0-windows10.0.19041.0 -r win-x64 --self-contained true -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\DynamicIsland.iss'

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: DynamicIsland-portable-win-x64
          path: publish

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: DynamicIsland-Setup
          path: installer/Output/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (self-contained linux-x64)
        run: dotnet publish DynamicIsland.csproj -f net9.0 -r linux-x64 --self-contained true -o publish-linux

      - name: Package tar.gz
        run: tar czf DynamicIsland-linux-x64.tar.gz -C publish-linux .

      - name: Build .deb
        run: bash installer/build-deb.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DynamicIsland-linux-x64
          path: |
            DynamicIsland-linux-x64.tar.gz
            dynamic-island_*.deb

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DynamicIsland-linux-x64.tar.gz
            dynamic-island_*.deb
